version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mensageria-postgres
    environment:
      POSTGRES_DB: mensageria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: mensageria-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mensageria_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
